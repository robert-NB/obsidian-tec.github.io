<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var l = window.location;
        var segments = l.pathname.split("/").filter(Boolean);
        var basePath = l.hostname.endsWith("github.io") && segments.length > 0 ? "/" + segments[0] + "/" : "/";
        l.replace(l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + basePath);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=/" />
  </head>
  <body></body>
</html>
