<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // SPA single-page: cualquier 404 redirige a la raíz del repo en GitHub Pages.
      (function () {
        var l = window.location;
        var repoBase = "/obsidian-tec.github.io/";
        l.replace(l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + repoBase);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=/obsidian-tec.github.io/" />
  </head>
  <body></body>
</html>
