    <!-- SPA fallback para GitHub Pages: restaura la URL original antes de montar React. -->
    <script>
      (function () {
        var q = window.location.search;
        if (q && q.indexOf("?p=") === 0) {
          var parts = q.slice(3).split("&q=");
          var path = parts[0].replace(/~and~/g, "&");
          var search = parts[1] ? "?" + parts[1].replace(/~and~/g, "&") : "";
          window.history.replaceState(
            null, null,
            window.location.pathname.replace(/\/$/, "") + path + search + window.location.hash
          );
        }
      })();
    </script>
