<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback para GitHub Pages.
      // Convierte /usuario/ruta/profunda en /?p=/ruta/profunda y deja que
      // index.html restaure la URL antes de que React Router monte.
      (function () {
        var segmentsToKeep = 1; // repo de proyecto -> mantener "/obsidian-tec.github.io"
        var l = window.location;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + segmentsToKeep).join("/") + "/?p=/" +
          l.pathname.slice(1).split("/").slice(segmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
